# ── Central Control ─────────────────────────────────────────────────
meetai:
  storage:
    upload-dir: uploads
    temp-dir: temp

  audio:
    sample-rate: 16000
    channels: 1
    format: wav
    max-size-mb: 100
    min-duration-sec: 1.0
    max-duration-sec: 7200.0
    silence-threshold-ratio: 0.7
    supported-formats: wav,mp3,m4a,ogg,flac,webm

  stt:
    # openai_whisper | gpt4o | assemblyai | deepgram
    # 화자 분리 지원: assemblyai, deepgram (openai_whisper/gpt4o는 전 세그먼트 SPEAKER_00)
    # deepgram = 실시간 녹음과 같은 nova-3·같은 API 키라 화자 라벨 체계가 일치한다
    engine: ${STT_ENGINE:assemblyai}
    confidence-threshold: 0.8
    max-retries: 3
    retry-base-delay-ms: 1000
    retry-max-delay-ms: 8000
    polish-enabled: true
    # 별칭 gpt-4o-mini는 프로젝트 모델 제한에서 403(model_not_found)이 났음 —
    # 처음부터 허용돼 있던 날짜 스냅샷을 기본값으로 사용
    polish-model: ${POLISH_MODEL:gpt-4o-mini-2024-07-18}

  openai:
    api-key: ${OPENAI_API_KEY}
    whisper-model: whisper-1
    whisper-language: ko
    # 실시간(말하는 중) 자막 — OpenAI Realtime API
    realtime-model: ${OPENAI_REALTIME_MODEL:gpt-4o-transcribe}
    realtime-enabled: ${OPENAI_REALTIME_ENABLED:true}
    # 온라인 회의 지연 계측 로그([STT계측-온라인]) — 시끄러우면 false
    latency-log: ${OPENAI_LATENCY_LOG:true}

  assemblyai:
    api-key: ${ASSEMBLYAI_API_KEY:}
    language-code: ko
    # 0 = 화자 수 자동 감지 (참여 인원을 모르는 오프라인 녹음 기본값)
    speakers-expected: ${STT_SPEAKERS_EXPECTED:0}
    # speech_model 명시가 필요할 때만 값을 넣는다(비우면 요청에 포함하지 않음).
    # universal-2를 기본값으로 뒀더니 업로드가 전부 500으로 실패했다 —
    # 모델 세대 이름이지 이 파라미터의 허용 값이 아닌 것으로 보인다.
    # 넣으려면 AssemblyAI 문서에서 허용 값을 먼저 확인할 것
    speech-model: ${ASSEMBLYAI_SPEECH_MODEL:}
    # speakers-expected를 모를 때 쓰는 범위 힌트 (0 = 미지정).
    # min을 2로 주면 전부 한 화자로 뭉치는 것을 막을 수 있다.
    # 단, 2분 미만 오디오에서는 적용되지 않는 이슈가 있다
    min-speakers: ${STT_MIN_SPEAKERS:0}
    max-speakers: ${STT_MAX_SPEAKERS:0}

  # 실시간 녹음 화자 분리 — Speechmatics 스트리밍 (한국어 실시간 diarize 지원)
  # SPEECHMATICS_ENABLED=true 로 켜면 OpenAI 롤링 배치 대신 스트리밍 사용
  speechmatics:
    api-key: ${SPEECHMATICS_KEY:}
    url: ${SPEECHMATICS_URL:wss://eu2.rt.speechmatics.com/v2}
    language: ${SPEECHMATICS_LANGUAGE:ko}
    enabled: ${SPEECHMATICS_ENABLED:false}
    # 확정 자막 지연 상한(초). 낮으면 자막이 빨리 뜨지만 문장이 잘게 쪼개짐 → 자연스러운 문장 단위로 3.5
    max-delay-sec: ${SPEECHMATICS_MAX_DELAY:3.5}
    operating-point: ${SPEECHMATICS_OPERATING_POINT:enhanced}
    speaker-sensitivity: ${SPEECHMATICS_SPEAKER_SENSITIVITY:0.6}
    # 에너지 VAD 노이즈 게이트 — 무음/노이즈 프레임만 0으로(타임라인 유지). 화자분리·타임스탬프 안전
    noise-gate: ${SPEECHMATICS_NOISE_GATE:true}
    noise-gate-threshold: ${SPEECHMATICS_NOISE_GATE_THRESHOLD:180}
    # 말하는 중 미리보기 자막(반응속도↑). 프론트가 is_final 구분 렌더링 준비되면 true로
    partials: ${SPEECHMATICS_PARTIALS:false}

  # 실시간 녹음 화자 분리 — Deepgram nova-3 스트리밍 (한국어 ko + diarize, ~300ms)
  # DEEPGRAM_ENABLED=true 로 켜면 Speechmatics/OpenAI 롤링보다 우선 사용
  deepgram:
    api-key: ${DEEPGRAM_API_KEY:}
    enabled: ${DEEPGRAM_ENABLED:false}
    # true면 온라인 회의 STT도 Deepgram 사용 (기본 OpenAI Realtime 대신) — A/B 테스트용, env로 롤백 가능
    online-enabled: ${DEEPGRAM_ONLINE_ENABLED:false}
    model: ${DEEPGRAM_MODEL:nova-3}
    language: ${DEEPGRAM_LANGUAGE:ko}
    # 발화 종료(문장 경계) 판정 무음(ms). 작을수록 확정이 빨라지는 대신 문장이 잘게 쪼개짐
    # 300 = 반응속도 우선. 문장이 과도하게 쪼개지면 env로 500~700으로 올려 튜닝
    endpointing-ms: ${DEEPGRAM_ENDPOINTING_MS:300}
    # 말하는 중 미리보기(is_final:false) — 프론트가 partial 교체 렌더링 지원 시 켤 것
    partials: ${DEEPGRAM_PARTIALS:true}
    # 지연 계측 로그([STT계측]) — 구간별 ms + 오디오 시계 기준 총 지연. 시끄러우면 false
    latency-log: ${DEEPGRAM_LATENCY_LOG:true}

  livekit:
    api-key: ${LIVEKIT_API_KEY:}
    api-secret: ${LIVEKIT_API_SECRET:}
    url: ${LIVEKIT_URL:}

  diarization:
    min-speakers: 1
    max-speakers: 10

  live:
    chunk-min-duration-sec: 0.5
    chunk-max-silence-ratio: 0.7
    chunk-expected-sample-rate: 16000


# ── Database ─────────────────────────────────────────────────────────
# Railway: SPRING_DATASOURCE_URL 환경변수로 PostgreSQL(Supabase) 연결
# 로컬:    환경변수 없으면 H2 파일 DB 사용
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./meetai_test;AUTO_SERVER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    show-sql: false
    properties:
      hibernate.format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${PORT:8000}

logging:
  level:
    com.nectarsoft.meetai: INFO
