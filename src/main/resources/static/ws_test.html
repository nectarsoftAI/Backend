<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MeetAI WebSocket 테스트</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; margin: 0; }
    h2 { color: #4ec9b0; margin-top: 0; }
    button { margin: 5px; padding: 8px 16px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 4px; font-size: 14px; }
    button:hover { background: #1177bb; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.danger { background: #c72e2e; }
    button.danger:hover { background: #e03c3c; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-left: 10px; }
    .status.disconnected { background: #555; }
    .status.connected { background: #2d7a3a; color: #8ff08f; }
    .status.recording { background: #7a2d2d; color: #ff8f8f; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }
    .section-title { color: #858585; font-size: 12px; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
    #timer { color: #dcdcaa; font-size: 13px; margin-left: 10px; }
    #chunk-counter { color: #858585; font-size: 12px; margin-left: 10px; }

    /* STT 결과 */
    #transcript-box {
      background: #0d1117; padding: 16px; min-height: 180px; max-height: 300px;
      overflow-y: auto; border: 1px solid #238636; border-radius: 6px; margin-top: 8px;
      font-size: 16px; line-height: 2;
    }
    .segment { padding: 6px 0; border-bottom: 1px solid #1c2128; }
    .segment .badge {
      display: inline-block; background: #1f6feb; color: #fff;
      font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-right: 8px; vertical-align: middle;
    }
    .segment .time { color: #555; font-size: 11px; margin-right: 8px; }
    .segment .text { color: #e6edf3; }

    /* 서버 raw 메시지 */
    #raw-box {
      background: #252526; padding: 10px; height: 130px; overflow-y: auto;
      border: 1px solid #3c3c3c; border-radius: 4px; margin-top: 8px; font-size: 12px;
    }
    .recv { color: #4ec9b0; }
    .send-log { color: #dcdcaa; }
    .info { color: #9cdcfe; }
    .error { color: #f48771; }
  </style>
</head>
<body>
  <h2>MeetAI 실시간 STT 테스트</h2>

  <div>
    <button id="btn-connect" onclick="connect()">연결</button>
    <button id="btn-record" onclick="startRecording()" disabled>녹음 시작</button>
    <button id="btn-stop" class="danger" onclick="stopRecording()" disabled>녹음 종료</button>
    <span id="status" class="status disconnected">연결 안됨</span>
    <span id="timer"></span>
    <span id="chunk-counter"></span>
  </div>
  <div style="margin-top:8px; font-size:12px; color:#858585">
    Meeting ID: <span id="meeting-id" style="color:#dcdcaa">-</span>
  </div>

  <div class="section-title">🎙 STT 실시간 결과 (5초마다 갱신)</div>
  <div id="transcript-box">
    <span style="color:#555">녹음을 시작하면 여기에 자막이 표시됩니다...</span>
  </div>

  <div class="section-title">서버 메시지 (RAW)</div>
  <div id="raw-box"></div>

  <script>
    const WS_URL = 'wss://backend-production-894a3.up.railway.app/api/v1/live/ws';
    const CHUNK_INTERVAL_MS = 5000;

    let ws = null;
    let mediaRecorder = null;
    let timerInterval = null;
    let elapsed = 0;
    let chunkCount = 0;
    let isFirstSegment = true;

    // ── 로그 ──────────────────────────────────────
    function rawLog(msg, cls = 'info') {
      const box = document.getElementById('raw-box');
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    // ── WebSocket 연결 ──────────────────────────────
    function connect() {
      if (ws) return;
      rawLog(`연결 중: ${WS_URL}`);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus('connected', '연결됨');
        rawLog('WebSocket 연결 성공');
        document.getElementById('btn-record').disabled = false;
        document.getElementById('btn-connect').disabled = true;
      };

      ws.onmessage = (e) => {
        rawLog(`← ${e.data}`, 'recv');
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'session_created') {
            document.getElementById('meeting-id').textContent = msg.meeting_id;
          } else if (msg.type === 'segment') {
            addSegment(msg);
          } else if (msg.type === 'session_ended') {
            rawLog('세션 종료됨');
          } else if (msg.type === 'error') {
            rawLog(`서버 오류: ${msg.message}`, 'error');
          }
        } catch (_) {}
      };

      ws.onerror = () => rawLog('WebSocket 에러', 'error');
      ws.onclose = (e) => {
        rawLog(`연결 종료 (code=${e.code})`);
        setStatus('disconnected', '연결 안됨');
        ws = null;
        document.getElementById('btn-connect').disabled = false;
        document.getElementById('btn-record').disabled = true;
        document.getElementById('btn-stop').disabled = true;
      };
    }

    // ── 녹음 시작 ────────────────────────────────────
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        isFirstSegment = true;
        chunkCount = 0;
        document.getElementById('transcript-box').innerHTML =
          '<span style="color:#555">5초마다 STT 결과가 나타납니다...</span>';

        mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });

        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0 && ws && ws.readyState === WebSocket.OPEN) {
            e.data.arrayBuffer().then(buf => {
              ws.send(buf);
              chunkCount++;
              document.getElementById('chunk-counter').textContent =
                `청크 전송: ${chunkCount}회 (${(buf.byteLength / 1024).toFixed(1)}KB)`;
              rawLog(`→ binary 전송 ${buf.byteLength} bytes`, 'send-log');
            });
          }
        };

        mediaRecorder.start(CHUNK_INTERVAL_MS);
        setStatus('recording', '녹음 중');
        document.getElementById('btn-record').disabled = true;
        document.getElementById('btn-stop').disabled = false;

        elapsed = 0;
        timerInterval = setInterval(() => {
          elapsed++;
          document.getElementById('timer').textContent = `⏱ ${formatTime(elapsed)}`;
        }, 1000);

        rawLog('녹음 시작');
      } catch (err) {
        rawLog(`마이크 접근 실패: ${err.message}`, 'error');
      }
    }

    // ── 녹음 종료 ────────────────────────────────────
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
      }
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '';
      document.getElementById('btn-record').disabled = false;
      document.getElementById('btn-stop').disabled = true;
      setStatus('connected', '연결됨');

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'end' }));
        rawLog('→ {"type":"end"} 전송', 'send-log');
      }
    }

    // ── STT 세그먼트 표시 ──────────────────────────────
    function addSegment(msg) {
      const box = document.getElementById('transcript-box');
      if (isFirstSegment) { box.innerHTML = ''; isFirstSegment = false; }

      const div = document.createElement('div');
      div.className = 'segment';
      const timeStr = msg.start_sec != null ? formatSec(msg.start_sec) : '';
      div.innerHTML = `
        <span class="badge">${msg.speaker_label || 'SPK'}</span>
        <span class="time">${timeStr}</span>
        <span class="text">${msg.text}</span>
      `;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // ── 유틸 ─────────────────────────────────────────
    function setStatus(cls, text) {
      const el = document.getElementById('status');
      el.className = `status ${cls}`;
      el.textContent = text;
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function formatSec(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(Math.floor(sec % 60)).padStart(2, '0');
      return `${m}:${s}`;
    }

    function getSupportedMimeType() {
      const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4'];
      for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
      return '';
    }
  </script>
</body>
</html>
