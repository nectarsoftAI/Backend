<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WebSocket 테스트</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    #log { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; background: #f9f9f9; }
    .ok  { color: green; }
    .err { color: red; }
    .msg { color: blue; }
    input { width: 500px; }
    button { margin-left: 8px; }
  </style>
</head>
<body>
  <h2>MeetAI WebSocket 테스트</h2>

  <p>
    1. 먼저 Swagger에서 <code>POST /api/v1/live/sessions</code> 호출 후 sessionId 복사<br>
    2. 아래 URL에 붙여넣고 Connect
  </p>

  <input id="url" value="ws://localhost:8000/api/v1/live/ws/" placeholder="ws://localhost:8000/api/v1/live/ws/{sessionId}">
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <button onclick="sendPing()">Send Ping</button>

  <div id="log"></div>

  <script>
    let ws = null;

    function log(msg, cls) {
      const div = document.getElementById('log');
      div.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function connect() {
      const url = document.getElementById('url').value.trim();
      if (ws) ws.close();
      log('연결 시도: ' + url, '');
      ws = new WebSocket(url);
      ws.onopen    = () => log('✅ 연결 성공!', 'ok');
      ws.onmessage = e => log('📨 수신: ' + e.data, 'msg');
      ws.onerror   = e => log('❌ 오류 발생', 'err');
      ws.onclose   = e => log('🔌 연결 종료 (code=' + e.code + ')', 'err');
    }

    function disconnect() {
      if (ws) { ws.close(); ws = null; }
    }

    function sendPing() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('{"action":"ping"}');
        log('📤 전송: {"action":"ping"}', '');
      } else {
        log('연결되지 않음', 'err');
      }
    }
  </script>
</body>
</html>
